 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SureCheck</title>

<style>

/* Background */
body {
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0a192f, #020617);
  color: white;
  text-align: center;
}

/* Screens */
.screen { display: none; }
.active { display: block; }

/* Glass Card Effect */
.screen {
  background: rgba(255, 255, 255, 0.05);
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

/* Buttons */
button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #2563eb;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #1d4ed8;
}

/* Input */
input {
  padding: 10px;
  width: 80%;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* Dropdown */
.suggestions {
  width: 80%;
  margin: auto;
  background: #1e293b;
  border-radius: 8px;
  display: none;
  text-align: left;
}

.suggestion-item {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #334155;
}

.suggestion-item:hover {
  background: #334155;
}

/* Result Colors */
.genuine {
  color: #22c55e;
  text-shadow: 0 0 10px #22c55e;
}

.fake {
  color: #ef4444;
  text-shadow: 0 0 10px #ef4444;
}

/* Scanner Animation */
.scanner-box {
  width: 250px;
  height: 250px;
  border: 3px solid #22c55e;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 25px #22c55e;
}

.scan-line {
  width: 100%;
  height: 3px;
  background: #22c55e;
  position: absolute;
  animation: scan 2s infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

</style>

</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <h1>SureCheck</h1>
  <p>Verify product authenticity before purchase</p>
  <button onclick="goToScan()">Scan Product</button>
</div>

<!-- SCAN -->
<div id="scanScreen" class="screen">
  <h2>Scanning Product...</h2>

  <!-- Animated Scanner -->
  <div class="scanner-box">
    <div class="scan-line"></div>
  </div>

  <p>Search Product ID</p>

  <!-- Input -->
  <input type="text" id="productId" placeholder="Enter Product ID"
         onfocus="showSuggestions()" oninput="filterSuggestions()">

  <!-- Dropdown -->
  <div id="suggestions" class="suggestions"></div>

  <br>
  <button onclick="manualVerify()">Verify Product</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <h2 id="resultTitle"></h2>
  <div id="productDetails"></div>
  <button id="activateBtn" onclick="activateProduct()">Activate Product</button>
  <br>
  <button onclick="goHome()">Back Home</button>
</div>

<script>

// Database
let products = [
  { productId: "QR001", productName: "Medicine A", brand: "HealthCare Ltd", batchNumber: "B123", expiryDate: "2026-10", scanCount: 1, activated: false },
  { productId: "QR002", productName: "Shampoo B", brand: "CleanHair", batchNumber: "B987", expiryDate: "2027-05", scanCount: 5, activated: true },
  { productId: "QR003", productName: "Face Cream", brand: "GlowCare", batchNumber: "C456", expiryDate: "2026-08", scanCount: 2, activated: false },
  { productId: "QR004", productName: "Protein Powder", brand: "FitLife", batchNumber: "D789", expiryDate: "2025-12", scanCount: 20, activated: false }
];

let currentProduct = null;

// Navigation
function goToScan() {
  showScreen("scanScreen");
}

function goHome() {
  showScreen("homeScreen");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// Suggestions
function showSuggestions() {
  let box = document.getElementById("suggestions");
  box.style.display = "block";
  renderSuggestions(products);
}

function filterSuggestions() {
  let input = document.getElementById("productId").value.toLowerCase();
  let filtered = products.filter(p => p.productId.toLowerCase().includes(input));
  renderSuggestions(filtered);
}

function renderSuggestions(list) {
  let box = document.getElementById("suggestions");
  box.innerHTML = "";

  list.forEach(p => {
    let div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = p.productId;
    div.onclick = () => selectID(p.productId);
    box.appendChild(div);
  });
}

function selectID(id) {
  document.getElementById("productId").value = id;
  document.getElementById("suggestions").style.display = "none";
}

// Verify
function manualVerify() {
  let id = document.getElementById("productId").value.trim();
  verifyProduct(id);
}

// Logic
function verifyProduct(id) {

  let product = products.find(p => p.productId === id);

  let title = document.getElementById("resultTitle");
  let details = document.getElementById("productDetails");
  let btn = document.getElementById("activateBtn");

  if (!product) {
    title.innerHTML = "🔴 FAKE PRODUCT";
    title.className = "fake";
    details.innerHTML = "Product not found!";
    btn.style.display = "none";
  }
  else if (product.activated || product.scanCount > 10) {
    title.innerHTML = "🔴 FAKE PRODUCT";
    title.className = "fake";
    details.innerHTML = "Already used or too many scans!";
    btn.style.display = "none";
  }
  else {
    title.innerHTML = "🟢 GENUINE PRODUCT";
    title.className = "genuine";
    details.innerHTML = `
      Name: ${product.productName}<br>
      Brand: ${product.brand}<br>
      Batch: ${product.batchNumber}<br>
      Expiry: ${product.expiryDate}
    `;
    btn.style.display = "inline-block";
    currentProduct = product;
  }

  showScreen("resultScreen");
}

// Activate
function activateProduct() {
  if (currentProduct) {
    currentProduct.activated = true;
    currentProduct.scanCount++;
    alert("Product Activated!");
    goHome();
  }
}

</script>

</body>
</html>
